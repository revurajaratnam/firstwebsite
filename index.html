<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewportal" content="width=display-width,intial-scale=1.0">
        <title>firstwebsite.com</title>
    </head>
    <style>
        body{
            width: 1500px;
            height:700px;
            background-image: url("image.jpg");
        }
        .parent{
            display: flex;
            background:midnightblue;
            padding-top:-10px;
            margin-top: -10px;
            padding-bottom:-100px;
            margin-bottom:-100px;
            height:70px;
            margin-left:-10px;
            margin-right: -10px;
            
        }
        h1{
            color:lightgray;
            margin:150px;
            margin-top:10px;
            height: 50px;
            width:500px;
        }
        h1:hover{
            color:midnightblue;
            background:white;
            transform: scale(1.0);
            padding: 10px;
        }
       .example{
         text-align: center;
         text-decoration: wavy;
         color: white;
         margin: 300px;
         font-size: 65px;
         scroll-behavior:1px;
         text-shadow: black;
         transition: cubic-bezier(2.5);
       }
       .auto{
        font-size:12px;
        padding-bottom:05px;
        animation:scroll-left 20s linear infinite;
       }
       @keyframes scroll-left{
        from{transform: translateX(100%);}
        to{transform: translateX(-100%);}
       }
       .auto1{
        font-size: 12px;
        padding-bottom: 10px;
        animation: scroll-right 20s linear infinite;
       }
       @keyframes scroll-right{
        from{transform:translateX(100%) ;}
        to{transform:translateY(-100%);}
       }
    </style>
    <body>
        <div class="parent">
        <h1>Home</h1>
        <h1>Menu</h1>
        <h1>Category</h1>
        <h1>Contact</h1></div><br><br>
        <div class="example" >
            <h6 class="auto">Perform -----> Practice ----> Prepare</h6>
            <h2>Welcome to Edupoly </h2>
            <h6 class="auto1">Perform -----> Practice ----> Prepare</h6>
        </div>
    </body>

</html>
